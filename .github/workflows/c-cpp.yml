name: C/C++ CI

on:
  push:
    branches: [ "master", "dev" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-bincache

    steps:
      - uses: actions/checkout@v4

      # Modern CMake (>= 3.28, the project minimum) + Ninja.
      - name: Install CMake & Ninja
        uses: lukka/get-cmake@latest

      # System packages a few vcpkg ports need to build from source
      # (openssl/perl, libpq/bison+flex, autotools-based ports, …).
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config autoconf autoconf-archive automake libtool \
            bison flex perl \
            curl zip unzip tar

      - name: Bootstrap vcpkg
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg.git "$VCPKG_ROOT"
          "$VCPKG_ROOT/bootstrap-vcpkg.sh" -disableMetrics

      # Cache the compiled packages (Drogon & co. are expensive to build).
      - name: Cache vcpkg binary cache
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-

      - name: Configure
        run: |
          mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE"
          cmake --preset dev

      - name: Build
        run: cmake --build build/dev

      # storage integration tests GTEST_SKIP() when DATABASE_URL is unset,
      # so the suite stays green without a Postgres service.
      - name: Test
        run: ctest --preset test-dev --output-on-failure
